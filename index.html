<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            color: #171717;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #737373;
            font-size: 16px;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f5f5f5;
            border-radius: 14px;
            padding: 18px 20px;
            text-decoration: none;
            color: inherit;
            transition: background 0.15s;
        }
        .link-card:hover {
            background: #ebebeb;
        }
        .link-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .link-text {
            text-align: left;
        }
        .link-title {
            font-size: 16px;
            font-weight: 600;
            color: #171717;
            display: block;
        }
        .link-desc {
            font-size: 13px;
            color: #737373;
            display: block;
            margin-top: 2px;
        }
        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #a3a3a3;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #171717; color: #fafafa; }
            .link-card { background: #262626; }
            .link-card:hover { background: #303030; }
            .link-title { color: #fafafa; }
            .link-desc { color: #a3a3a3; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">📓</div>
    <h1>DailyQ</h1>
    <p class="subtitle">Daily Question Journal</p>

    <div class="links">
        <a class="link-card" href="Support.html">
            <span class="link-icon">💬</span>
            <span class="link-text">
                <span class="link-title">Support</span>
                <span class="link-desc">Get help or contact the developer</span>
            </span>
        </a>
        <a class="link-card" href="PrivacyPolicy.html">
            <span class="link-icon">🔒</span>
            <span class="link-text">
                <span class="link-title">Privacy Policy</span>
                <span class="link-desc">How we handle your data</span>
            </span>
        </a>
    </div>

    <p class="footer">© 2025 DailyQ</p>
</div>

</body>
</html>
